<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Prediction System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f7fc;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .container{
            background:white;
            width:450px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            margin-bottom:10px;
            color:#333;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:25px;
        }

        .input-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            font-weight:bold;
            margin-bottom:8px;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#007bff;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            padding:15px;
            border-radius:10px;
            text-align:center;
            display:none;
        }

        .purchase{
            background:#d4edda;
            color:#155724;
        }

        .nopurchase{
            background:#f8d7da;
            color:#721c24;
        }

        .info{
            margin-top:20px;
            padding:15px;
            background:#eef4ff;
            border-radius:10px;
            font-size:14px;
            color:#444;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Purchase Prediction</h1>

    <p class="subtitle">
        Predict whether a customer is likely to purchase a product based on Age and Salary.
    </p>

    <div class="input-group">
        <label>Age</label>
        <input type="number" id="age" placeholder="Enter customer's age">
    </div>

    <div class="input-group">
        <label>Salary</label>
        <input type="number" id="salary" placeholder="Enter annual salary">
    </div>

    <button onclick="predictPurchase()">
        Predict Purchase
    </button>

    <div id="result" class="result"></div>

    <div class="info">
        <strong>Input:</strong>
        <ul>
            <li>Age of customer</li>
            <li>Annual salary of customer</li>
        </ul>
        <br>
        <strong>Output:</strong>
        <ul>
            <li>Will Purchase</li>
            <li>Will Not Purchase</li>
        </ul>
    </div>

</div>

<script>

async function predictPurchase() {

    const age = document.getElementById("age").value;
    const salary = document.getElementById("salary").value;

    if(age === "" || salary === ""){
        alert("Please enter both Age and Salary.");
        return;
    }

    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            input: [Number(age), Number(salary)]
        })
    });

    const data = await response.json();

    const resultDiv = document.getElementById("result");

    resultDiv.style.display = "block";

    if(data.prediction == 1){

        resultDiv.className = "result purchase";

        resultDiv.innerHTML = `
            <h2>Prediction Result</h2>
            <p><strong>Customer is likely to PURCHASE the product.</strong></p>
        `;

    } else {

        resultDiv.className = "result nopurchase";

        resultDiv.innerHTML = `
            <h2>Prediction Result</h2>
            <p><strong>Customer is NOT likely to purchase the product.</strong></p>
        `;
    }
}

</script>

</body>
</html>
